name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: 1
  RUST_BACKTRACE: 1
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt
        working-directory: photon-leptos
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo clippy (workspace)
        working-directory: photon-leptos
        run: cargo clippy --workspace --all-targets --features ssr -- -D warnings

  leptos-lints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos
          prefix-key: dylint-6.0.1

      # Install from crates.io (not taiki-e prebuilts): some prebuilt cargo-dylint
      # binaries bake DYLINT_DRIVER_MANIFEST_DIR to a CI path and fail with
      # "Unable to update .../dylint/driver".
      - name: Install cargo-dylint
        run: |
          cargo install cargo-dylint --locked --version 6.0.1 --force
          cargo install dylint-link --locked --version 6.0.1 --force

      # leptos-lints@v0.1.2 pins nightly-2025-05-14; full workspace `--features ssr`
      # fails on newer transitive crates (e.g. zerocopy). Lint hydrate UI crates with
      # `--no-deps` where Leptos API lints apply. The e2e demo needs wasm32 so
      # target-specific `web-sys` deps resolve.
      #
      # CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS=fallback: the ephemeral dylint
      # driver build otherwise resolves cargo-platform 0.3.3 (MSRV 1.91) against
      # rustc 1.89 on that pinned nightly.
      - name: Install leptos-lints nightly toolchain
        run: |
          rustup toolchain install nightly-2025-05-14 --component rustc-dev,llvm-tools-preview
          rustup target add wasm32-unknown-unknown --toolchain nightly-2025-05-14

      - name: cargo dylint (leptos-lints)
        working-directory: photon-leptos
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: fallback
        run: |
          cargo dylint --all -p photon-leptos --no-deps -- --features hydrate
          cargo dylint --all -p photon-leptos-e2e-demo --no-deps -- --features hydrate --target wasm32-unknown-unknown

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        working-directory: photon-leptos
        run: cargo audit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo test (integration crates)
        working-directory: photon-leptos
        run: cargo test -p photon-axum -p photon-leptos -p photon-leptos-macros -p photon-leptos-bench --features ssr

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo doc
        working-directory: photon-leptos
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo package (public crates)
        working-directory: photon-leptos
        run: |
          cargo package -p photon-leptos-macros --allow-dirty --list
          cargo package -p photon-axum --allow-dirty --list
          cargo package -p photon-leptos --allow-dirty --list

  wasm-hydrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo check hydrate wasm
        working-directory: photon-leptos
        run: cargo check -p photon-leptos --target wasm32-unknown-unknown --features hydrate

  e2e:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: photon-leptos/e2e/tests/package-lock.json

      - name: Install npm dependencies
        working-directory: photon-leptos/e2e/tests
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        working-directory: photon-leptos/e2e/tests
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: photon-leptos/e2e/tests
        run: npx playwright install --with-deps

      - name: cargo leptos end-to-end
        working-directory: photon-leptos
        env:
          CI: true
          # Fail-closed transport crypto (photon 0.1.1+); fixed 32-byte key for e2e only
          PHOTON_TRANSPORT_KEY: cGhvdG9uLWRldi10cmFuc3BvcnQta2V5LTMyYnl0ZXM=
        run: cargo leptos end-to-end --project photon-leptos-e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            photon-leptos/e2e/tests/playwright-report/
            photon-leptos/e2e/tests/test-results/
          if-no-files-found: ignore

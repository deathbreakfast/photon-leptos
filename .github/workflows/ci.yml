name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_BUILD_JOBS: 1
  RUST_BACKTRACE: 1
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: deathbreakfast/photon
          path: photon

      - name: Configure git credentials for private deps
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo clippy (workspace)
        working-directory: photon-leptos
        run: cargo clippy --workspace --all-targets --features ssr -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: deathbreakfast/photon
          path: photon

      - name: Configure git credentials for private deps
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo test (integration crates)
        working-directory: photon-leptos
        run: cargo test -p photon-axum -p photon-leptos -p photon-leptos-macros --features ssr

  e2e:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: deathbreakfast/photon
          path: photon

      - name: Configure git credentials for private deps
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: photon-leptos/e2e/tests/package-lock.json

      - name: Install npm dependencies
        working-directory: photon-leptos/e2e/tests
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        working-directory: photon-leptos/e2e/tests
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: photon-leptos/e2e/tests
        run: npx playwright install --with-deps

      - name: cargo leptos end-to-end
        working-directory: photon-leptos
        env:
          CI: true
        run: cargo leptos end-to-end --project photon-leptos-e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            photon-leptos/e2e/tests/playwright-report/
            photon-leptos/e2e/tests/test-results/
          if-no-files-found: ignore

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: 1
  RUST_BACKTRACE: 1
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt
        working-directory: photon-leptos
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo clippy (workspace)
        working-directory: photon-leptos
        run: cargo clippy --workspace --all-targets --features ssr -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo test (integration crates)
        working-directory: photon-leptos
        run: cargo test -p photon-axum -p photon-leptos -p photon-leptos-macros -p photon-leptos-bench --features ssr

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo doc
        working-directory: photon-leptos
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo package (public crates)
        working-directory: photon-leptos
        run: |
          cargo package -p photon-leptos-macros --allow-dirty --list
          cargo package -p photon-axum --allow-dirty --list
          cargo package -p photon-leptos --allow-dirty --list

  wasm-hydrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos

      - name: cargo check hydrate wasm
        working-directory: photon-leptos
        run: cargo check -p photon-leptos --target wasm32-unknown-unknown --features hydrate

  e2e:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - uses: actions/checkout@v4
        with:
          path: photon-leptos

      - uses: actions/checkout@v4
        with:
          repository: unified-field-dev/photon
          path: photon

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: photon-leptos
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: photon-leptos/e2e/tests/package-lock.json

      - name: Install npm dependencies
        working-directory: photon-leptos/e2e/tests
        run: npm ci

      - name: Get Playwright version
        id: pw-version
        working-directory: photon-leptos/e2e/tests
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: photon-leptos/e2e/tests
        run: npx playwright install --with-deps

      - name: cargo leptos end-to-end
        working-directory: photon-leptos
        env:
          CI: true
          # Fail-closed transport crypto (photon 0.1.1+); fixed 32-byte key for e2e only
          PHOTON_TRANSPORT_KEY: cGhvdG9uLWRldi10cmFuc3BvcnQta2V5LTMyYnl0ZXM=
        run: cargo leptos end-to-end --project photon-leptos-e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            photon-leptos/e2e/tests/playwright-report/
            photon-leptos/e2e/tests/test-results/
          if-no-files-found: ignore

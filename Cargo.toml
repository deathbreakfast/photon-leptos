[workspace]
resolver = "2"
members = ["photon-axum", "photon-leptos", "photon-leptos-macros"]

[workspace.dependencies]
quark = { git = "https://github.com/unified-field-dev/quark.git", rev = "77e50b8374b65319ceeaf0b2ab1664a2919f517a" }
photon-runtime = { path = "../photon/photon-runtime", default-features = false, features = ["ssr", "mem"] }
photon-backend = { path = "../photon/photon-backend", default-features = false, features = ["ssr", "mem"] }
photon = { path = "../photon/photon", default-features = false, features = ["ssr", "mem"] }
axum = { version = "0.8.4", features = ["ws"] }
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.12"
tokio = { version = "1.45.0", features = ["rt-multi-thread", "macros", "sync", "time"] }
leptos = { version = "0.8.5", default-features = false }
leptos-use = { version = "0.18", default-features = false }
codee = { version = "0.3", default-features = false }
cfg-if = "1"
log = "0.4"
